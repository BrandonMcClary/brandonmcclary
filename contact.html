<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact | Brandon McClary</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:#f4f6f8;
      --surface:#ffffff;
      --surface-2:#f8fafc;
      --text:#0f172a;
      --muted:#64748b;
      --border:#e2e8f0;
      --blue:#1d4ed8;
      --blue-dark:#153eaf;
      --shadow:0 12px 30px rgba(15,23,42,0.08);
      --shadow-hover:0 18px 40px rgba(15,23,42,0.12);
      --radius-lg:22px;
      --radius-md:16px;
      --container:1280px;
    }

    *{margin:0;padding:0;box-sizing:border-box;}

    body{
      font-family:'Inter',sans-serif;
      background:var(--bg);
      color:var(--text);
      line-height:1.6;
    }

    a{text-decoration:none;color:inherit;}
    img{max-width:100%;display:block;}

    .container{
      width:min(var(--container),calc(100% - 40px));
      margin:0 auto;
    }

    /* EXACT NAVBAR */
    .topbar{
      position:sticky;
      top:0;
      z-index:1000;
      background:rgba(255,255,255,0.9);
      backdrop-filter:blur(12px);
      border-bottom:1px solid rgba(226,232,240,0.9);
    }

    .nav{
      min-height:84px;
      display:flex;
      align-items:center;
      justify-content:space-between;
    }

    .logo{
      font-family:'Poppins';
      font-size:2rem;
      font-weight:800;
      letter-spacing:-0.04em;
    }

    .logo span{color:var(--blue);}

    .nav-links{
      display:flex;
      gap:28px;
    }

    .nav-links a{
      font-weight:600;
      color:#334155;
    }

    .nav-links a.active{color:var(--blue);}

    /* PAGE */
    .page-shell{
      padding:34px 0 70px;
    }

    .intro{
      margin-bottom:26px;
    }

    .intro h1{
      font-family:'Poppins';
      font-size:2.8rem;
      letter-spacing:-0.05em;
      margin-bottom:8px;
    }

    .intro p{
      color:var(--muted);
    }

    /* CARDS */
    .links{
      max-width:700px;
      display:flex;
      flex-direction:column;
      gap:18px;
    }

    .link-card{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:18px 20px;
      border-radius:var(--radius-md);
      border:1px solid var(--border);
      background:var(--surface);
      box-shadow:var(--shadow);
      transition:.2s;
    }

    .link-card:hover{
      transform:translateY(-4px);
      box-shadow:var(--shadow-hover);
    }

    .label{
      font-size:.75rem;
      font-weight:800;
      text-transform:uppercase;
      color:var(--blue-dark);
      margin-bottom:4px;
    }

    .value{
      font-weight:700;
    }

    .arrow{
      color:var(--blue);
      font-weight:800;
    }

    .footer{
      margin-top:34px;
      text-align:center;
      color:var(--muted);
      font-size:.9rem;
    }

    @media(max-width:860px){
      .nav{
        flex-direction:column;
        align-items:flex-start;
        padding:16px 0;
      }

      .nav-links{
        gap:18px;
      }
    }
  </style>
</head>
<body>

<header class="topbar">
  <div class="container nav">
    <a href="index.html" class="logo"><span>Brandon</span> McClary</a>

    <nav class="nav-links">
      <a href="index.html">Home</a>
      <a href="panthers.html">Panthers</a>
      <a href="hornets.html">Hornets</a>
      <a href="about-me.html">About</a>
      <a href="contact.html" class="active">Contact</a>
    </nav>
  </div>
</header>

<main class="page-shell">
  <div class="container">

    <div class="intro">
      <h1>Contact</h1>
      <p>Best ways to reach me and connect</p>
    </div>

    <div class="links">

      <a href="mailto:panthersbran@gmail.com" class="link-card">
        <div>
          <div class="label">Email</div>
          <div class="value">panthersbran@gmail.com</div>
        </div>
        <div class="arrow">→</div>
      </a>

      <a href="https://instagram.com/brandonmcclaryy" target="_blank" class="link-card">
        <div>
          <div class="label">Instagram</div>
          <div class="value">@BrandonMcClaryy</div>
        </div>
        <div class="arrow">→</div>
      </a>

      <a href="https://x.com/branclt" target="_blank" class="link-card">
        <div>
          <div class="label">X</div>
          <div class="value">@BranCLT</div>
        </div>
        <div class="arrow">→</div>
      </a>

      <a href="https://instagram.com/panthersbran" target="_blank" class="link-card">
        <div>
          <div class="label">Panthers Page</div>
          <div class="value">@panthersbran</div>
        </div>
        <div class="arrow">→</div>
      </a>

      <a href="https://instagram.com/hornetsbran" target="_blank" class="link-card">
        <div>
          <div class="label">Hornets Page</div>
          <div class="value">@hornetsbran</div>
        </div>
        <div class="arrow">→</div>
      </a>

    </div>

    <div class="footer">
      © 2026 Brandon McClary
    </div>

  </div>
</main>

</body>
</html>
